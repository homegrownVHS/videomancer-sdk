# Sabattier Program Configuration

[program]
program_id = "com.lzxindustries.sabattier"
program_name = "Sabattier"
program_version = "1.0.0"
abi_version = ">=1.0,<2.0"
author = "Lars Larsen"
license = "GPL-3.0"
categories = ["Film"]
program_type = "processing"
description = "Sabattier pseudo-solarization with partial tonal reversal, Mackie line edge glow, per-channel processing, and equidensity mode"
hardware_compatibility = ["rev_b"]
core = "yuv444_30b"
url = "https://github.com/lzxindustries/videomancer-sdk"

[[parameter]]
parameter_id = "rotary_potentiometer_1"
name_label = "Y Inversion"
control_mode = "linear"
display_min_value = 0
display_max_value = 100
initial_value = 512
display_float_digits = 1
suffix_label = "%"

[[parameter]]
parameter_id = "rotary_potentiometer_2"
name_label = "UV Inversion"
control_mode = "linear"
display_min_value = 0
display_max_value = 100
initial_value = 0
display_float_digits = 1
suffix_label = "%"

[[parameter]]
parameter_id = "rotary_potentiometer_3"
name_label = "Mackie Gain"
control_mode = "linear"
display_min_value = 0
display_max_value = 100
initial_value = 512
display_float_digits = 1
suffix_label = "%"

[[parameter]]
parameter_id = "rotary_potentiometer_4"
name_label = "Mackie Width"
control_mode = "linear"
display_min_value = 0
display_max_value = 100
initial_value = 0
display_float_digits = 1
suffix_label = "%"

[[parameter]]
parameter_id = "rotary_potentiometer_5"
name_label = "Tint"
control_mode = "linear"
display_min_value = 0
display_max_value = 100
initial_value = 0
display_float_digits = 1
suffix_label = "%"

[[parameter]]
parameter_id = "rotary_potentiometer_6"
name_label = "Threshold"
control_mode = "linear"
display_min_value = 0
display_max_value = 100
initial_value = 0
display_float_digits = 1
suffix_label = "%"

[[parameter]]
parameter_id = "toggle_switch_7"
name_label = "Equidensity"
value_labels = ["Off", "On"]
initial_value_label = "Off"

[[parameter]]
parameter_id = "toggle_switch_8"
name_label = "Polarity"
value_labels = ["Positive", "Negative"]
initial_value_label = "Positive"

[[parameter]]
parameter_id = "toggle_switch_9"
name_label = "Channel"
value_labels = ["Y Only", "YUV"]
initial_value_label = "Y Only"

[[parameter]]
parameter_id = "toggle_switch_10"
name_label = "Curve Shape"
value_labels = ["S-Curve", "W-Curve"]
initial_value_label = "S-Curve"

[[parameter]]
parameter_id = "toggle_switch_11"
name_label = "Metallic"
value_labels = ["Off", "On"]
initial_value_label = "Off"

[[parameter]]
parameter_id = "linear_potentiometer_12"
name_label = "Mix"
control_mode = "linear"
display_min_value = 0
display_max_value = 100
initial_value = 1023
display_float_digits = 1
suffix_label = "%"

[[preset]]
name = "Basic"
rotary_potentiometer_1 = 1023
rotary_potentiometer_2 = 512
rotary_potentiometer_4 = 512
rotary_potentiometer_5 = 512
rotary_potentiometer_6 = 512

[[preset]]
name = "Metallic"
rotary_potentiometer_3 = 409
rotary_potentiometer_4 = 512
toggle_switch_8 = 1

[[preset]]
name = "Equidensity"
rotary_potentiometer_1 = 818
rotary_potentiometer_2 = 614
rotary_potentiometer_3 = 614
rotary_potentiometer_4 = 307
rotary_potentiometer_5 = 307
rotary_potentiometer_6 = 511
toggle_switch_7 = 1
toggle_switch_9 = 1
toggle_switch_10 = 1
